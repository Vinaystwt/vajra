<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420" font-family="'SF Mono', 'Fira Mono', monospace" font-size="13">
  <defs>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#E11D48"/>
    </marker>
    <marker id="arr-cyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00E5FF"/>
    </marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgba(237,237,237,0.4)"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="#050505" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="rgba(237,237,237,0.85)" font-size="15" font-weight="600" letter-spacing="0.5">Raw Key vs Vajra — Attack Comparison</text>

  <!-- ======== DIVIDER ======== -->
  <line x1="450" y1="58" x2="450" y2="395" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- ======== LEFT PANEL: Raw Key Path ======== -->
  <text x="225" y="80" text-anchor="middle" fill="#E11D48" font-size="12" font-weight="600" letter-spacing="0.5">RAW KEY PATH</text>

  <!-- Agent/Attacker -->
  <rect x="60" y="100" width="130" height="50" rx="7" fill="rgba(225,29,72,0.08)" stroke="rgba(225,29,72,0.5)" stroke-width="1.5"/>
  <text x="125" y="122" text-anchor="middle" fill="#E11D48" font-size="11" font-weight="600">Agent / Attacker</text>
  <text x="125" y="138" text-anchor="middle" fill="rgba(237,237,237,0.35)" font-size="10">holds raw keypair</text>

  <!-- Arrow: agent → vault direct -->
  <line x1="190" y1="125" x2="260" y2="125" stroke="#E11D48" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="225" y="117" text-anchor="middle" fill="rgba(225,29,72,0.7)" font-size="10">direct authority</text>

  <!-- Vault (raw) -->
  <rect x="260" y="100" width="120" height="50" rx="7" fill="rgba(225,29,72,0.06)" stroke="rgba(225,29,72,0.35)" stroke-width="1"/>
  <text x="320" y="122" text-anchor="middle" fill="rgba(237,237,237,0.75)" font-size="11" font-weight="600">SPL Vault</text>
  <text x="320" y="138" text-anchor="middle" fill="rgba(237,237,237,0.35)" font-size="10">agent = authority</text>

  <!-- Arrow: vault → attacker wallet -->
  <line x1="380" y1="125" x2="410" y2="125" stroke="#E11D48" stroke-width="2" marker-end="url(#arr-red)"/>

  <!-- Attacker wallet -->
  <rect x="410" y="100" width="0" height="0"/>
  <text x="415" y="122" fill="#E11D48" font-size="11" font-weight="600">Drain</text>

  <!-- Result box -->
  <rect x="60" y="195" width="360" height="70" rx="8" fill="rgba(225,29,72,0.07)" stroke="rgba(225,29,72,0.3)" stroke-width="1"/>
  <text x="240" y="220" text-anchor="middle" fill="#E11D48" font-size="12" font-weight="700">DRAINED</text>
  <text x="240" y="238" text-anchor="middle" fill="rgba(237,237,237,0.5)" font-size="10">loss_amount = 50,000,000 (50 DemoUSD)</text>
  <text x="240" y="252" text-anchor="middle" fill="rgba(237,237,237,0.35)" font-size="10">tx: wTo4fANW...   ·   vault_delta = −50</text>

  <!-- Key agent warning -->
  <rect x="60" y="300" width="360" height="50" rx="7" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="240" y="323" text-anchor="middle" fill="rgba(237,237,237,0.45)" font-size="11">If key is compromised or agent misbehaves,</text>
  <text x="240" y="339" text-anchor="middle" fill="rgba(237,237,237,0.45)" font-size="11">the entire vault can be emptied in one tx.</text>

  <!-- ======== RIGHT PANEL: Vajra Path ======== -->
  <text x="675" y="80" text-anchor="middle" fill="#00E5FF" font-size="12" font-weight="600" letter-spacing="0.5">VAJRA PATH</text>

  <!-- Agent/Attacker (right) -->
  <rect x="470" y="100" width="130" height="50" rx="7" fill="rgba(255,255,255,0.04)" stroke="rgba(237,237,237,0.15)" stroke-width="1"/>
  <text x="535" y="122" text-anchor="middle" fill="rgba(237,237,237,0.75)" font-size="11" font-weight="600">Agent / Attacker</text>
  <text x="535" y="138" text-anchor="middle" fill="rgba(237,237,237,0.35)" font-size="10">delegated signer only</text>

  <!-- Arrow: agent → vajra program -->
  <line x1="600" y1="125" x2="650" y2="125" stroke="rgba(237,237,237,0.4)" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <text x="625" y="117" text-anchor="middle" fill="rgba(237,237,237,0.35)" font-size="10">request</text>

  <!-- Vajra program -->
  <rect x="650" y="100" width="110" height="50" rx="7" fill="rgba(0,229,255,0.06)" stroke="#00E5FF" stroke-width="1.5"/>
  <text x="705" y="122" text-anchor="middle" fill="#00E5FF" font-size="11" font-weight="600">Vajra Program</text>
  <text x="705" y="138" text-anchor="middle" fill="rgba(237,237,237,0.35)" font-size="10">12 guard checks</text>

  <!-- Arrow: program blocks -->
  <line x1="705" y1="150" x2="705" y2="185" stroke="#E11D48" stroke-width="2" marker-end="url(#arr-red)"/>

  <!-- Block annotation -->
  <rect x="650" y="185" width="110" height="35" rx="6" fill="rgba(225,29,72,0.1)" stroke="rgba(225,29,72,0.4)" stroke-width="1"/>
  <text x="705" y="207" text-anchor="middle" fill="#E11D48" font-size="11" font-weight="600">BLOCKED</text>

  <!-- Result box (right) -->
  <rect x="460" y="260" width="380" height="70" rx="8" fill="rgba(0,229,255,0.05)" stroke="rgba(0,229,255,0.3)" stroke-width="1"/>
  <text x="650" y="285" text-anchor="middle" fill="#00E5FF" font-size="12" font-weight="700">VAULT SAFE</text>
  <text x="650" y="303" text-anchor="middle" fill="rgba(237,237,237,0.5)" font-size="10">vault_delta = 0 · inner_token_transfers = 0</text>
  <text x="650" y="317" text-anchor="middle" fill="rgba(237,237,237,0.35)" font-size="10">tx: 5yWAEdtj...   ·   rule_triggered = perTxCap</text>

  <!-- Key benefit -->
  <rect x="460" y="365" width="380" height="35" rx="7" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="650" y="387" text-anchor="middle" fill="rgba(237,237,237,0.5)" font-size="11">Failed tx is the proof. Anyone can verify on-chain.</text>
</svg>
